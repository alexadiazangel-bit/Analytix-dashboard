<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytix.2026</title>
<script>
    // --- FUNCIÓN CORREGIDA PARA CARGAR DESDE LA API ---
    async function loadClients() {
        const API_URL = 'https://analytix-api.onrender.com/api/clientes';
        try {
            console.log("Intentando conectar con:", API_URL);
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Error en la respuesta de la API');
            
            const data = await response.json();
            
            // Asignamos los datos a la variable global que tu Dashboard usa
            window.clients = data;
            
            // Refrescamos la tabla y las métricas
            if (typeof renderTable === 'function') renderTable();
            if (typeof updateKPI === 'function') updateKPI();
            
            console.log("Datos cargados correctamente desde la base de datos.");
        } catch (error) {
            console.error("No se pudo conectar a la API. Usando datos locales:", error);
            // Respaldo por si la API falla
            const localData = localStorage.getItem('analytix_clients');
            if (localData) {
                window.clients = JSON.parse(localData);
                if (typeof renderTable === 'function') renderTable();
            }
        }
    }

    // Ejecutar al cargar la página
    window.onload = function() {
        loadClients();
    };
</script>
</head>
<body>
    <h1>Dashboard Analytix.2026</h1>
    <p>Cargando datos desde la base de datos...</p>
</body>
</html>
