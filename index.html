<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytix 2026</title>
</head>
<body>

<h1>Analytix Dashboard (Corregido)</h1>

<script>
let clients = [];

const GITHUB_DEFAULTS = {
  repo: 'alexadiazangel-bit/Analytix-dashboard',
  path: 'clientes.json',
  token: ''
};

let ghConfig = {};

function loadGhConfig() {
  ghConfig = { ...GITHUB_DEFAULTS };
}

async function loadData(){
  if(ghConfig.repo){
    const ok = await syncFromGitHub(true);
    if(ok) return;
  }

  clients = [];
}

async function syncFromGitHub(silent=false){
  if(!ghConfig.repo){return false;}

  try{
    const url = `https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path}`;

    const res = await fetch(url,{
      headers: ghConfig.token
        ? { Authorization: `token ${ghConfig.token}`, Accept:'application/vnd.github.v3+json'}
        : { Accept:'application/vnd.github.v3+json'},
      cache:"no-store"
    });

    if(!res.ok) throw new Error(res.status);

    const meta = await res.json();
    const json = JSON.parse(atob(meta.content));

    clients = json.clientes || [];

    console.log("DATA:", clients);

    return true;

  }catch(e){
    console.log(e);
    return false;
  }
}

async function init(){
  loadGhConfig();
  await loadData();
}

init();
</script>

</body>
</html>
