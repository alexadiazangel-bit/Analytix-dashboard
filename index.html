<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytix 2026 — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ── THEME VARIABLES ── */
:root {
  --bg:         #f4f2ee;
  --surface:    #ffffff;
  --surface2:   #f0ede8;
  --border:     #ddd9d2;
  --text:       #1a1816;
  --text-dim:   #7a756d;
  --accent:     #2563eb;
  --accent2:    #f59e0b;
  --ok:         #16a34a;
  --pending:    #dc2626;
  --ok-bg:      #dcfce7;
  --pending-bg: #fee2e2;
  --shadow:     0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.12);
  --radius:     10px;
  --radius-sm:  6px;
  --font-head:  'Syne', sans-serif;
  --font-mono:  'DM Mono', monospace;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg:         #111010;
  --surface:    #1c1b1a;
  --surface2:   #242322;
  --border:     #2e2c2a;
  --text:       #f0ede8;
  --text-dim:   #7a756d;
  --accent:     #3b82f6;
  --accent2:    #f59e0b;
  --ok:         #22c55e;
  --pending:    #ef4444;
  --ok-bg:      #14532d33;
  --pending-bg: #7f1d1d33;
  --shadow:     0 2px 12px rgba(0,0,0,.4);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.5);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;transition:background var(--transition),color var(--transition)}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:6px 10px;outline:none;transition:border-color var(--transition)}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:60px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);
}
.logo{font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-0.5px;color:var(--text)}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.sync-indicator{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-dim)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sync-dot.syncing{background:var(--accent2);box-shadow:0 0 6px var(--accent2)88;animation:spin-pulse 1s infinite}
@keyframes spin-pulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.sync-dot.error{background:var(--pending);box-shadow:0 0 6px var(--pending)88;animation:none}
.btn-icon{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:background var(--transition),color var(--transition)}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon svg{width:18px;height:18px}
.btn-primary{background:var(--accent);color:#fff;padding:7px 16px;border-radius:var(--radius-sm);font-family:var(--font-head);font-weight:600;font-size:12px;letter-spacing:.5px;transition:opacity var(--transition)}
.btn-primary:hover{opacity:.85}
.gear-btn{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:background var(--transition),color var(--transition);background:var(--surface2)}
.gear-btn:hover{background:var(--border);color:var(--text)}

/* ── LAYOUT ── */
main{max-width:1300px;margin:0 auto;padding:28px 24px}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.stat-value{font-family:var(--font-head);font-size:28px;font-weight:800;line-height:1}
.stat-value.ok{color:var(--ok)}
.stat-value.pending{color:var(--pending)}
.stat-sub{font-size:10px;color:var(--text-dim);margin-top:4px}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding-left:34px}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-dim);pointer-events:none}
.filter-select{padding:6px 10px;border-radius:var(--radius-sm);min-width:130px}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
.tbl th{padding:11px 14px;text-align:left;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);font-weight:500;white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background var(--transition)}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl .col-client{font-family:var(--font-head);font-weight:600;font-size:13px}
.tbl .col-num{font-variant-numeric:tabular-nums;text-align:right}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;letter-spacing:.8px;font-weight:500;text-transform:uppercase}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.pending{background:var(--pending-bg);color:var(--pending)}
.actions{display:flex;gap:6px}
.act-btn{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition);color:var(--text-dim)}
.act-btn:hover.edit{background:#dbeafe;color:#2563eb}
.act-btn:hover.del{background:#fee2e2;color:#dc2626}
.act-btn:hover.notes{background:#fef3c7;color:#d97706}
.act-btn svg{width:14px;height:14px}
.note-count{font-size:9px;background:var(--accent2);color:#fff;border-radius:10px;padding:1px 5px;position:absolute;top:-3px;right:-3px}
.note-wrap{position:relative;display:inline-flex}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px;color:var(--text-dim)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform var(--transition)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-head);font-weight:700;font-size:16px}
.modal-body{padding:20px 24px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
.form-input{width:100%}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border)}
.btn-cancel{padding:7px 16px;border-radius:var(--radius-sm);color:var(--text-dim);background:var(--surface2);font-family:var(--font-head);font-weight:600;font-size:12px;transition:background var(--transition)}
.btn-cancel:hover{background:var(--border)}
.btn-danger{background:#dc2626;color:#fff;padding:7px 16px;border-radius:var(--radius-sm);font-family:var(--font-head);font-weight:600;font-size:12px;transition:opacity var(--transition)}
.btn-danger:hover{opacity:.85}

/* ── NOTES PANEL ── */
.notes-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;max-height:280px;overflow-y:auto}
.note-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.note-meta{font-size:10px;color:var(--text-dim);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.note-text{font-size:12px;line-height:1.6;white-space:pre-wrap}
.btn-del-note{color:var(--pending);font-size:10px;cursor:pointer;background:none;border:none;transition:opacity var(--transition)}
.btn-del-note:hover{opacity:.7}
.note-add{display:flex;gap:8px;align-items:flex-end}
.note-add textarea{flex:1}

/* ── CONFIG PANEL ── */
.config-field{margin-bottom:14px}
.config-status{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:12px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border)}
.config-status.warn{background:#fef3c7;border-color:#f59e0b;color:#92400e}
[data-theme="dark"] .config-status.warn{background:#451a0344;border-color:#d97706;color:#fcd34d}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;right:28px;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;z-index:999;opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* ── DOWNLOAD BAR ── */
.dl-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.dl-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:11px;letter-spacing:.5px;transition:background var(--transition),color var(--transition),border-color var(--transition);text-decoration:none}
.dl-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.dl-btn svg{width:14px;height:14px}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .tbl th:nth-child(n+4),.tbl td:nth-child(n+4){display:none}
}
</style>
</head>
<body data-theme="light">

<!-- HEADER -->
<header>
  <span class="logo">Analytix<span>.</span>2026</span>
  <div class="header-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Listo</span>
      <span id="syncTime" style="color:var(--text-dim);margin-left:2px"></span>
    </div>
    <button class="btn-icon" id="syncBtn" title="Sincronizar con GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
    </button>
    <button class="btn-icon" id="themeBtn" title="Cambiar tema">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="gear-btn" id="gearBtn" title="Configurar conexión GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="btn-primary" id="addBtn">+ Nuevo cliente</button>
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="stats" id="statsRow"></div>

  <!-- DOWNLOAD BAR -->
  <div class="dl-bar">
    <button class="dl-btn" id="dlJson">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar JSON
    </button>
    <button class="dl-btn" id="dlCsv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar CSV
    </button>
    <button class="dl-btn" id="dlXlsx">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Descargar XLSX (via CSV)
    </button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar cliente…" />
    </div>
    <select id="filterGrafo" class="filter-select">
      <option value="">Todos los estados</option>
      <option value="OK">OK</option>
      <option value="PENDIENTE">PENDIENTE</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th class="col-num">Componentes</th>
          <th class="col-num">Conexiones</th>
          <th>Grafo</th>
          <th>Observaciones</th>
          <th>Actualizaciones</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<!-- MODAL: Edit/Add -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">Editar cliente</span>
      <button class="btn-icon" id="closeEditModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Cliente</label>
        <input class="form-input" type="text" id="f-cliente" />
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Componentes</label>
          <input class="form-input" type="number" id="f-componente" />
        </div>
        <div class="form-row">
          <label class="form-label">Conexiones primarias</label>
          <input class="form-input" type="number" id="f-conexiones" />
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Grafo relaciones</label>
        <select class="form-input" id="f-grafo">
          <option value="OK">OK</option>
          <option value="PENDIENTE">PENDIENTE</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Observaciones</label>
        <textarea class="form-input" id="f-obs"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Actualizaciones</label>
        <textarea class="form-input" id="f-act"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelEdit">Cancelar</button>
      <button class="btn-primary" id="saveEdit">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- MODAL: Delete -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">Eliminar cliente</span>
      <button class="btn-icon" id="closeDeleteModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-dim);line-height:1.6">¿Estás seguro de que deseas eliminar a <strong id="deleteClientName" style="color:var(--text)"></strong>? Esta acción no se puede deshacer.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelDelete">Cancelar</button>
      <button class="btn-danger" id="confirmDelete">Eliminar</button>
    </div>
  </div>
</div>

<!-- MODAL: Notes -->
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="notesModalTitle">Notas</span>
      <button class="btn-icon" id="closeNotesModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="notes-list" id="notesList"></div>
      <div class="note-add">
        <textarea id="noteInput" placeholder="Escribe una nota…" rows="3"></textarea>
        <button class="btn-primary" id="addNoteBtn" style="white-space:nowrap">+ Agregar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Config -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ Configurar GitHub Sync</span>
      <button class="btn-icon" id="closeConfigModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="config-field">
        <label class="form-label">Repositorio (usuario/nombre-repo)</label>
        <input class="form-input" type="text" id="cfg-repo" placeholder="ingrafaelduarte-dotcom/analytix-dashboard" />
      </div>
      <div class="config-field">
        <label class="form-label">Ruta del JSON</label>
        <input class="form-input" type="text" id="cfg-path" value="clientes.json" />
      </div>
      <div class="config-field">
        <label class="form-label">GitHub Personal Access Token (PAT)</label>
        <input class="form-input" type="password" id="cfg-token" placeholder="github_pat_..." />
      </div>
      <div class="config-status" id="configStatus" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelConfig">Cancelar</button>
      <button class="btn-primary" id="saveConfig">Guardar y conectar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ── DATA ── */
let clients = [];
let editingId = null;
let deletingId = null;
let notesId = null;

/* ── CONFIG: GitHub es la fuente de verdad. ── */
// CONFIG PERMANENTE — hardcodeada en el HTML, nunca se pierde aunque limpien caché
const GITHUB_DEFAULTS = {
  repo:  'alexadiazangel-bit/Analytix-dashboard',
  path:  'clientes.json',
  token: ''   // ← el usuario completa su token en el panel de config (⚙️)
};

let ghConfig = {};

function loadGhConfig() {
  ghConfig = { ...GITHUB_DEFAULTS };
  // Intentar localStorage primero, luego cookie como respaldo
  try {
    const raw = localStorage.getItem('analytix_gh') || readCookie('analytix_gh');
    if (raw) {
      const saved = JSON.parse(raw);
      ghConfig = { ...GITHUB_DEFAULTS, ...saved };
      // Si vino de cookie, restaurar también en localStorage
      try { localStorage.setItem('analytix_gh', raw); } catch(e) {}
    }
  } catch(e) { ghConfig = { ...GITHUB_DEFAULTS }; }
}

function saveCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days*24*60*60*1000);
  document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Strict`;
}
function readCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? decodeURIComponent(match[2]) : null;
}
function saveGhConfig(cfg) {
  ghConfig = { ...GITHUB_DEFAULTS, ...cfg };
  const val = JSON.stringify(ghConfig);
  try { localStorage.setItem('analytix_gh', val); } catch(e) {}
  saveCookie('analytix_gh', val, 90);
}

/* ── INIT ── */
async function init() {
  loadGhConfig();
  // Si no hay token, abrir config automáticamente con aviso claro
  if (!ghConfig.token) {
    await loadData();
    render(); updateStats();
    // Mostrar modal de config con mensaje de bienvenida
    document.getElementById('cfg-repo').value = ghConfig.repo || '';
    document.getElementById('cfg-path').value = ghConfig.path || 'clientes.json';
    document.getElementById('cfg-token').value = '';
    const st = document.getElementById('configStatus');
    st.style.display = 'flex';
    st.innerHTML = '🔑 Ingresa tu token de GitHub para conectar y guardar los datos permanentemente.';
    openModal('configModal');
    return;
  }
  await loadData();
  render();
  updateStats();
  updateSyncTime();
}

async function loadData() {
  // 1. Si hay config de GitHub, cargar SIEMPRE desde GitHub (fuente de verdad)
  if (ghConfig.repo && ghConfig.token) {
    const ok = await syncFromGitHub(true);
    if (ok) return;
  }
  // 2. Caché local como fallback
  try {
    const saved = localStorage.getItem('analytix_clients');
    if (saved) { clients = JSON.parse(saved); return; }
  } catch(e) {}
  // 3. Datos embebidos como último recurso
  clients = JSON.parse(JSON.stringify(BUNDLED_DATA));
  persist();
}

function persist(pushGH = true) {
  // Guardar en localStorage como caché
  try { localStorage.setItem('analytix_clients', JSON.stringify(clients)); } catch(e) {}
  // Guardar en GitHub si está configurado (fuente de verdad)
  if (pushGH && ghConfig.repo && ghConfig.token) {
    pushToGitHub();
  }
}

function nextId() {
  return clients.length ? Math.max(...clients.map(c=>c.id)) + 1 : 1;
}

/* ── RENDER ── */
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const g = document.getElementById('filterGrafo').value;
  return clients.filter(c =>
    (!q || c.cliente.toLowerCase().includes(q)) &&
    (!g || c.grafoRelaciones === g)
  );
}

  const rows = filtered();

    tbody.innerHTML = `<tr><td colspan="8"><div class="empty">No se encontraron clientes.</div></td></tr>`;

      <td><span class="badge ${c.grafoRelaciones==='OK'?'ok':'pending'}">${c.grafoRelaciones}</span></td>
      <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim)">${esc(c.observaciones)||'—'}</td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim)">${esc(c.actualizaciones)||'—'}</td>

function updateStats() {
  const total = clients.length;
  const ok = clients.filter(c=>c.grafoRelaciones==='OK').length;
  const pend = clients.filter(c=>c.grafoRelaciones==='PENDIENTE').length;
  const comps = clients.reduce((a,c)=>a+Number(c.componente||0),0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total clientes</div><div class="stat-value">${total}</div><div class="stat-sub">Registros activos</div></div>
    <div class="stat-card"><div class="stat-label">Grafo OK</div><div class="stat-value ok">${ok}</div><div class="stat-sub">${Math.round(ok/total*100)||0}% del total</div></div>
    <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value pending">${pend}</div><div class="stat-sub">${Math.round(pend/total*100)||0}% del total</div></div>
    <div class="stat-card"><div class="stat-label">Total componentes</div><div class="stat-value">${comps.toLocaleString()}</div><div class="stat-sub">Suma acumulada</div></div>
  `;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ── EDIT ── */
function openEdit(id) {
  editingId = id;
  const c = id === 'new' ? {cliente:'',componente:'',conexionesPrimarias:'',grafoRelaciones:'OK',observaciones:'',actualizaciones:''} : clients.find(x=>x.id===id);
  document.getElementById('editModalTitle').textContent = id==='new' ? 'Nuevo cliente' : 'Editar cliente';
  document.getElementById('f-cliente').value = c.cliente;
  document.getElementById('f-componente').value = c.componente;
  document.getElementById('f-conexiones').value = c.conexionesPrimarias;
  document.getElementById('f-grafo').value = c.grafoRelaciones;
  document.getElementById('f-obs').value = c.observaciones||'';
  document.getElementById('f-act').value = c.actualizaciones||'';
  openModal('editModal');
}

document.getElementById('saveEdit').onclick = () => {
  const data = {
    cliente: document.getElementById('f-cliente').value.trim(),
    componente: Number(document.getElementById('f-componente').value)||0,
    conexionesPrimarias: Number(document.getElementById('f-conexiones').value)||0,
    grafoRelaciones: document.getElementById('f-grafo').value,
    observaciones: document.getElementById('f-obs').value.trim(),
    actualizaciones: document.getElementById('f-act').value.trim(),
  };
  if (!data.cliente) { toast('El nombre del cliente es requerido.'); return; }
  if (editingId === 'new') {
    clients.push({id:nextId(), notas:[], ...data});
  } else {
    const idx = clients.findIndex(c=>c.id===editingId);
    clients[idx] = {...clients[idx], ...data};
  }
  persist(); render(); updateStats(); closeAllModals();
  toast(editingId==='new'?'Cliente creado ✓':'Cambios guardados ✓');
};

document.getElementById('addBtn').onclick = () => openEdit('new');

/* ── DELETE ── */
function openDelete(id) {
  deletingId = id;
  const c = clients.find(x=>x.id===id);
  document.getElementById('deleteClientName').textContent = c.cliente;
  openModal('deleteModal');
}

document.getElementById('confirmDelete').onclick = () => {
  clients = clients.filter(c=>c.id!==deletingId);
  persist(); render(); updateStats(); closeAllModals();
  toast('Cliente eliminado.');
};

/* ── NOTES ── */
function openNotes(id) {
  notesId = id;
  const c = clients.find(x=>x.id===id);
  document.getElementById('notesModalTitle').textContent = `Notas — ${c.cliente}`;
  renderNotes();
  document.getElementById('noteInput').value = '';
  openModal('notesModal');
}

function renderNotes() {
  const c = clients.find(x=>x.id===notesId);
  const list = document.getElementById('notesList');
  if (!c.notas || !c.notas.length) {
    list.innerHTML = `<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px 0">Sin notas aún.</div>`;
    return;
  }
  list.innerHTML = c.notas.map((n,i)=>`
    <div class="note-item">
      <div class="note-meta">
        <span>${n.fecha}</span>
        <button class="btn-del-note" onclick="deleteNote(${i})">✕ Eliminar</button>
      </div>
      <div class="note-text">${esc(n.texto)}</div>
    </div>
  `).join('');
}

document.getElementById('addNoteBtn').onclick = () => {
  const txt = document.getElementById('noteInput').value.trim();
  if (!txt) return;
  const c = clients.find(x=>x.id===notesId);
  if (!c.notas) c.notas = [];
  c.notas.push({fecha: new Date().toLocaleString('es-CO'), texto: txt});
  persist(); renderNotes(); render();
  document.getElementById('noteInput').value = '';
  toast('Nota agregada ✓');
};

function deleteNote(idx) {
  const c = clients.find(x=>x.id===notesId);
  c.notas.splice(idx,1);
  persist(); renderNotes(); render();
}

/* ── GITHUB SYNC ── */
async function syncFromGitHub(silent = false) {
  if (!ghConfig.repo || !ghConfig.token) { openModal('configModal'); return false; }
  if (!silent) setSyncState('syncing','Sincronizando…');
  try {
    const url = `https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path||'clientes.json'}`;
    const res = await fetch(url, {headers:{Authorization:`token ${ghConfig.token}`,Accept:'application/vnd.github.v3+json'}});
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const meta = await res.json();
    const content = atob(meta.content.replace(/\n/g,''));
    const json = JSON.parse(content);
    clients = json.clientes;
    // Guardar en caché local (sin re-pushear a GitHub)
    try { localStorage.setItem('analytix_clients', JSON.stringify(clients)); } catch(e) {}
    render(); updateStats();
    setSyncState('ok','Sync OK');
    if (!silent) toast('Datos sincronizados desde GitHub ✓');
    return true;
  } catch(e) {
    setSyncState('error','Error sync');
    if (!silent) toast('Error al sincronizar: ' + e.message);
    return false;
  }
}

async function pushToGitHub() {
  if (!ghConfig.repo || !ghConfig.token) return;
  setSyncState('syncing','Guardando…');
  try {
    const url = `https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path||'clientes.json'}`;
    // Obtener SHA actual del archivo
    const metaRes = await fetch(url, {headers:{Authorization:`token ${ghConfig.token}`,Accept:'application/vnd.github.v3+json'}});
    const meta = metaRes.ok ? await metaRes.json() : {};
    const payload = {clientes: clients, lastSync: new Date().toISOString()};
    const body = {
      message: `Analytix update ${new Date().toLocaleString('es-CO')}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))))
    };
    if (meta.sha) body.sha = meta.sha;
    const putRes = await fetch(url, {
      method:'PUT',
      headers:{Authorization:`token ${ghConfig.token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if (!putRes.ok) throw new Error(`PUT ${putRes.status}`);
    setSyncState('ok','Guardado ✓');
    const now = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('syncTime').textContent = now;
    try { localStorage.setItem('analytix_lastSync', now); } catch(e) {}
  } catch(e) {
    setSyncState('error','Error al guardar');
    console.warn('Push failed', e);
  }
}

function setSyncState(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state!=='ok'?' '+state:'');
  lbl.textContent = label;
}

function updateSyncTime() {
  try {
    const t = localStorage.getItem('analytix_lastSync');
    if (t) document.getElementById('syncTime').textContent = t;
  } catch(e) {}
}

document.getElementById('syncBtn').onclick = () => syncFromGitHub(false);

/* ── CONFIG ── */
document.getElementById('gearBtn').onclick = () => {
  document.getElementById('cfg-repo').value = ghConfig.repo||'alexadiazangel-bit/Analytix-dashboard';
  document.getElementById('cfg-path').value = ghConfig.path||'clientes.json';
  document.getElementById('cfg-token').value = ghConfig.token||'';
  document.getElementById('configStatus').style.display='none';
  // Mostrar aviso si no hay config
  if (!ghConfig.repo || !ghConfig.token) {
    const st = document.getElementById('configStatus');
    st.style.display='flex';
    st.innerHTML = '⚠️ Sin configuración — Los datos se perderán al limpiar caché. Configura GitHub para persistencia permanente.';
  }
  openModal('configModal');
};

document.getElementById('saveConfig').onclick = async () => {
  const cfg = {
    repo: document.getElementById('cfg-repo').value.trim(),
    path: document.getElementById('cfg-path').value.trim() || 'clientes.json',
    token: document.getElementById('cfg-token').value.trim(),
  };
  // Guardar config inmediatamente
  saveGhConfig(cfg);
  const st = document.getElementById('configStatus');
  st.style.display='flex';
  st.innerHTML = '⏳ Probando conexión…';
  try {
    const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    const res = await fetch(url, {headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json'}});
    if (!res.ok) throw new Error(`HTTP ${res.status} — Verifica repo, ruta y token`);
    st.innerHTML = '✅ Sync OK — Conexión exitosa';
    setTimeout(()=>{ closeAllModals(); syncFromGitHub(); }, 1200);
  } catch(e) {
    st.innerHTML = `❌ Error: ${e.message}`;
  }
};

/* ── DOWNLOADS ── */
document.getElementById('dlJson').onclick = () => {
  const payload = {clientes: clients, lastSync: new Date().toISOString()};
  download('clientes.json', JSON.stringify(payload, null, 2), 'application/json');
  toast('JSON descargado ✓');
};

document.getElementById('dlCsv').onclick = () => {
  const cols = ['id','cliente','componente','conexionesPrimarias','grafoRelaciones','observaciones','actualizaciones'];
  const header = cols.join(',');
  const rows = clients.map(c => cols.map(k=>'"'+(String(c[k]||'').replace(/"/g,'""'))+'"').join(','));
  download('analytix_2026.csv', [header,...rows].join('\n'), 'text/csv');
  toast('CSV descargado ✓');
};

document.getElementById('dlXlsx').onclick = () => {
  // XLSX via CSV trick + BOM for Excel
  const cols = ['id','cliente','componente','conexionesPrimarias','grafoRelaciones','observaciones','actualizaciones'];
  const header = cols.join('\t');
  const rows = clients.map(c => cols.map(k=>String(c[k]||'')).join('\t'));
  download('analytix_2026.xls', '\uFEFF'+[header,...rows].join('\n'), 'application/vnd.ms-excel');
  toast('Excel descargado ✓');
};

function download(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

/* ── THEME ── */
let dark = false;
try { dark = localStorage.getItem('analytix_theme') === 'dark'; } catch(e) {}
function applyTheme() {
  document.body.dataset.theme = dark ? 'dark' : 'light';
  document.getElementById('themeIcon').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  try { localStorage.setItem('analytix_theme', dark ? 'dark' : 'light'); } catch(e) {}
}
document.getElementById('themeBtn').onclick = () => { dark=!dark; applyTheme(); };
applyTheme();

/* ── SEARCH/FILTER ── */
document.getElementById('searchInput').oninput = render;
document.getElementById('filterGrafo').onchange = render;

/* ── MODAL HELPERS ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }

document.getElementById('closeEditModal').onclick = () => closeModal('editModal');
document.getElementById('cancelEdit').onclick = () => closeModal('editModal');
document.getElementById('closeDeleteModal').onclick = () => closeModal('deleteModal');
document.getElementById('cancelDelete').onclick = () => closeModal('deleteModal');
document.getElementById('closeNotesModal').onclick = () => closeModal('notesModal');
document.getElementById('closeConfigModal').onclick = () => closeModal('configModal');
document.getElementById('cancelConfig').onclick = () => closeModal('configModal');

document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click', e => { if(e.target===ov) closeAllModals(); });
});

/* ── TOAST ── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ── START ── */
init();
